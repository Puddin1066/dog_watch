# MediaMTX — synthetic RTSP for Frigate dev (MOCK: not a real camera).
# Serves a libx264 test pattern at rtsp://mock_rtsp:8554/e1pro-mock on the Docker network.
# Start with: docker compose --profile mock-rtsp up -d

logLevel: warn
logDestinations: [stdout]

authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback

rtsp: true
rtspAddress: :8554
rtspTransports: [tcp]

rtmp: false
hls: false
webrtc: false

paths:
  e1pro-mock:
    runOnInit: ffmpeg -hide_banner -loglevel error -re -f lavfi -i testsrc=size=1280x720:rate=8 -pix_fmt yuv420p -c:v libx264 -preset ultrafast -tune zerolatency -profile:v baseline -an -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/e1pro-mock
    runOnInitRestart: yes
