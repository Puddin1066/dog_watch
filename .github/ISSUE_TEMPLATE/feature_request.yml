name: Feature request
description: Suggest an improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Keep scope aligned with PRD unless explicitly stated otherwise.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - v2 snapshot + motion
        - iMessage workflow
        - Phase 2 Frigate + RTSP
        - docs / developer experience
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
